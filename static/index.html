<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track and classify your job application emails from Gmail">
    <title>Job Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='2'><rect width='20' height='16' x='2' y='4' rx='2'/><path d='m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7'/></svg>">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="app-title">
                <div class="logo-mark">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="20" height="16" x="2" y="4" rx="2"/>
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                    </svg>
                </div>
                <div>
                    <h1>Job Tracker</h1>
                    <p class="app-subtitle">Gmail application intelligence</p>
                </div>
            </div>
            <div class="header-actions" id="headerActions"></div>
        </header>

        <main id="mainContent"></main>

        <footer class="app-footer">
            <span>Gmail API</span>
            <span class="footer-dot">·</span>
            <span>Auto-scans every 15 min</span>
            <span class="footer-dot">·</span>
            <span>Read-only · never stored externally</span>
        </footer>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/app.js"></script>
</body>

</html>
